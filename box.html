<!DOCTYPE html>
<html lang="en">
<head>
  <title>Box model </title>
  <style>
    nav {
      background-color: #333;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 24px;
      font-weight: bold;
    }

    .container {
      display: flex;
      justify-content: space-around;
      margin: 30px 20px;
    }

    .box {
      width: 250px;
      height: 300px;
      padding: 20px;
      margin: 10px;
      border: 2px solid #444;
      box-sizing: border-box;
      background-color: #f2f2f2;
      text-align: center;
    }

    .box img {
      width: 100px;
      height: 100px;
      object-fit: cover;
    }

    .box h1 {
      font-size: 18px;
      margin-top: 15px;
    }

    .footer {
      background-color: #333;
      color: white;
      text-align: center;
      padding: 15px;
      font-size: 16px;
      margin-top: 50px;
    }
  </style>
</head>
<body>

  <nav>
    My Awesome Website
  </nav>

  <div class="container">
    <div class="box">
      <img src="c.png">
      <h1> One</h1>
    </div>
    <div class="box">
      <img src="c.png">
      <h1>Two</h1>
    </div>
    <div class="box">
      <img src="c.png">
      <h1>Three</h1>
    </div>
  </div>

  <div class="footer">
    &copy; 2025 My Awesome Website | Designed by Pankaj Kangule
  </div>

</body>
</html>
